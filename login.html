<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card shadow p-4">
                <h3 class="text-center mb-4">Login</h3>
                <form id="logForm">
                    <div class="mb-3"><label>Email</label><input type="email" id="lEmail" class="form-control" required></div>
                    <div class="mb-3"><label>Password</label><input type="password" id="lPass" class="form-control" required></div>
                    <button class="btn btn-primary w-100">Login</button>
                </form>
                <a href="register.html" class="d-block text-center mt-3 text-decoration-none">No account? Sign up</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('logForm').onsubmit = (e) => {
            e.preventDefault();
            const stored = JSON.parse(localStorage.getItem('user'));
            if(stored && lEmail.value === stored.email && lPass.value === stored.pass) {
                localStorage.setItem('auth', 'true');
                window.location.href = "index.html";
            } else { alert("Invalid credentials!"); }
        };
    </script>
</body>
</html>
