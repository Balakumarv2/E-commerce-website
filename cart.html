<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container"><a class="navbar-brand fw-bold" href="index.html">SwiftShop</a></div>
    </nav>

    <div class="container">
        <h2 class="fw-bold mb-4">Shopping Cart</h2>
        <div id="cart-items-list" class="bg-white rounded shadow-sm p-3 border">

        </div>
        <div class="mt-4 p-4 bg-white shadow-sm rounded border d-flex justify-content-between align-items-center">
            <h3 class="fw-bold mb-0">Total: $<span id="cart-total">0.00</span></h3>
            <div>
                <button class="btn btn-outline-danger me-2" onclick="clearCart()">Empty Cart</button>
                <button class="btn btn-success px-4" onclick="alert('Proceeding to Payment...')">Checkout</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function showCart() {
            const list = document.getElementById('cart-items-list');
            let total = 0;
            list.innerHTML = cart.length ? cart.map((item, i) => {
                total += item.price;
                return `
                <div class="d-flex align-items-center border-bottom py-3">
                    <img src="${item.thumbnail}" width="60" class="me-3">
                    <div class="flex-grow-1">
                        <h6 class="mb-0 text-truncate" style="max-width:300px;">${item.title}</h6>
                        <span class="text-primary fw-bold">$${item.price}</span>
                    </div>
                    <button class="btn btn-sm btn-outline-danger" onclick="removeItem(${i})">Remove</button>
                </div>`;
            }).join('') : "<p class='text-center py-4 text-muted'>Your cart is empty.</p>";
            document.getElementById('cart-total').innerText = total.toFixed(2);
        }
        function removeItem(i) {
             cart.splice(i, 1); 
             localStorage.setItem('myCart', JSON.stringify(cart)); 
             showCart(); 
             updateNavbarCount(); 
            }
        function clearCart() { 
            localStorage.removeItem('myCart'); 
            cart = []; 
            showCart(); 
            updateNavbarCount(); 
        }
        showCart();
    </script>
</body>

</html>
