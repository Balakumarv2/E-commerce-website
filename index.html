<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShop | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SmartShop</a>
            <div class="d-flex align-items-center">
                <span id="user-greeting" class="text-light me-3 small"></span>
                <a href="login.html" id="login-nav" class="btn btn-outline-light btn-sm me-2">Login</a>
                <button id="logout-btn" class="btn btn-danger btn-sm me-2" style="display:none;"
                    onclick="logout()">Logout</button>
                <a href="cart.html" class="btn btn-primary btn-sm position-relative">
                    Cart 🛒
                    <span id="cart-count"
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </a>
            </div>
        </div>
    </nav>

    <header class="bg-light py-5 text-center shadow-sm mb-4">
        <div class="container">
            <h1 class="display-4 fw-bold">Modern Collections</h1>
            <p class="lead text-muted mb-4">Quality products fetched in real-time via API.</p>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <input type="text" id="search-input" class="form-control form-control-lg shadow-sm"
                        placeholder="Search for products or categories...">
                </div>
            </div>
        </div>
    </header>

    <main class="container mb-5">
        <div id="product-list" class="row g-4">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Loading products...</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
