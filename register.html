<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card shadow p-4">
                <h3 class="text-center mb-4">Create Account</h3>
                <form id="regForm">
                    <div class="mb-3"><label>Name</label><input type="text" id="rName" class="form-control" required></div>
                    <div class="mb-3"><label>Email</label><input type="email" id="rEmail" class="form-control" required></div>
                    <div class="mb-3"><label>Password</label><input type="password" id="rPass" class="form-control" required></div>
                    <button class="btn btn-success w-100">Register</button>
                </form>
                <a href="login.html" class="d-block text-center mt-3 text-decoration-none">Login instead</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('regForm').onsubmit = (e) => {
            e.preventDefault();
            const user = { name: rName.value, email: rEmail.value, pass: rPass.value };
            localStorage.setItem('user', JSON.stringify(user));
            alert("Registration Complete!"); window.location.href = "login.html";
        };
    </script>
</body>
</html>
